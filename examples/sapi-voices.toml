# SAPI 5.x Voice Configuration Installer
#
# Registers SAPI voice tokens in the Windows registry.  Does not install
# any files — it relies on the TTS model and text processor bundles already
# being present in the shared directory.
#
# Each voice is a selectable component under its language group.  The
# language group components mirror those in sapi-text-processors.toml;
# the user should install the matching text processor for each language.
#
# Install order: sapi-engine → sapi-tts-model → sapi-text-processors → sapi-voices

[package]
id = "com.example.mytts-voices"
name = "My TTS Voices"
version = "1.0.0"
publisher = "Example Corp"
architecture = "x64"
privileges = "admin"
depends_on = ["com.example.mytts-model", "com.example.mytts-text"]
default_dir = "#{commonappdata}/MyTTS"
disable_dir_page = true

[uninstall]
remove_app_dir = false

# ── Prerequisites ──────────────────────────────────────────────────────────

# The TTS engine COM server must be registered
[[prerequisites]]
name = "My TTS Engine"
required = true
[prerequisites.check]
registry = "HKCR\\CLSID\\{XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX}"

# The shared TTS model must be installed
[[prerequisites]]
name = "My TTS Model"
required = true
[prerequisites.check]
registry = "HKLM\\SOFTWARE\\Microsoft\\Windows\\CurrentVersion\\Uninstall\\com.example.mytts-model"

# ── Components ─────────────────────────────────────────────────────────────
#
# Language groups are parents; individual speakers are children.
# Deselecting a language group skips all its voices.

# North Sami (se) ──────────────────────
[[components]]
name = "lang_se"
display_name = "North Sami (se)"
description = "Voices for Davvisámegiella"
default = true

[[components]]
name = "voice_se_biret"
display_name = "Biret (Female)"
parent = "lang_se"
default = true

[[components]]
name = "voice_se_mahtte"
display_name = "Máhtte (Male)"
parent = "lang_se"
default = true

[[components]]
name = "voice_se_sunna"
display_name = "Sunná (Female)"
parent = "lang_se"
default = true

# South Sami (sma) ─────────────────────
[[components]]
name = "lang_sma"
display_name = "South Sami (sma)"
description = "Voices for Åarjelsaemien gïele"
default = true

[[components]]
name = "voice_sma_aanna"
display_name = "Aanna (Female)"
parent = "lang_sma"
default = true

# Lule Sami (smj) ──────────────────────
[[components]]
name = "lang_smj"
display_name = "Lule Sami (smj)"
description = "Voices for Julevsámegiella"
default = true

[[components]]
name = "voice_smj_abmut"
display_name = "Ábmut (Male)"
parent = "lang_smj"
default = true

[[components]]
name = "voice_smj_nihkol"
display_name = "Nihkol (Male)"
parent = "lang_smj"
default = true

[[components]]
name = "voice_smj_sigga"
display_name = "Siggá (Female)"
parent = "lang_smj"
default = true

# ═══════════════════════════════════════════════════════════════════════════
# Voice Token Registry Entries
#
# Each voice needs two registry blocks:
#   1. Token root key  — display name, locale strings, CLSID
#   2. Attributes subkey — metadata the engine reads at runtime
#
# BundlePath  = "#{app}"  → resolves to the shared #{commonappdata}/MyTTS dir
# BundleName  = "tts"   → engine loads {BundlePath}\tts.drb
# LanguageIndex / SpeakerIndex select the language and speaker within the model
# ═══════════════════════════════════════════════════════════════════════════

# ── North Sami: Biret ──────────────────────────────────────────────────────

[[registry]]
root = "hklm"
key = "SOFTWARE\\Microsoft\\Speech\\Voices\\Tokens\\MyTTS_se_Biret"
component = "voice_se_biret"
uninstall = "remove_key"
values = [
    { name = "", type = "string", data = "Biret - Davvisámegiella" },
    { name = "409", type = "string", data = "Biret - North Sami" },
    { name = "003B", type = "string", data = "Biret - Davvisámegiella" },
    { name = "CLSID", type = "string", data = "{XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXXX}" },
]

[[registry]]
root = "hklm"
key = "SOFTWARE\\Microsoft\\Speech\\Voices\\Tokens\\MyTTS_se_Biret\\Attributes"
component = "voice_se_biret"
uninstall = "remove_key"
values = [
    { name = "Name", type = "string", data = "Biret - Davvisámegiella" },
    { name = "ShortName", type = "string", data = "Biret" },
    { name = "Language", type = "string", data = "003B" },
    { name = "LanguageCode", type = "string", data = "se" },
    { name = "Gender", type = "string", data = "Female" },
    { name = "Age", type = "string", data = "Adult" },
    { name = "Vendor", type = "string", data = "Example Corp" },
    { name = "Version", type = "string", data = "1.0" },
    { name = "VendorPreferred", type = "string", data = "" },
    { name = "BundlePath", type = "string", data = "#{app}" },
    { name = "BundleName", type = "string", data = "tts" },
    { name = "SpeakerIndex", type = "dword", data = 2 },
    { name = "LanguageIndex", type = "dword", data = 1 },
]

