[profile.default]
retries = 0
fail-fast = true
slow-timeout = { period = "30s" }

[profile.ci]
retries = 0
fail-fast = false
slow-timeout = { period = "60s", terminate-after = 2 }

# Run admin tests from an elevated shell:
#   cargo nextest run -P admin --run-ignored ignored-only
[profile.admin]
retries = 0
fail-fast = true
slow-timeout = { period = "60s" }
